name:

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: converter-temperature.duckdns.org
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/apps/conversor-temperatura
            git pull
            docker build -t conversor-temperatura
            docker rm -f conversor-temperatura || true
            docker run -d --name conversor-temperatura -p 8080:80 conversor-temperatura