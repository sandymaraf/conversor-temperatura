<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Conversor de Temperatura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #5a6fe0;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🌡️ Conversor de Temperatura</h1>

    <input type="number" id="value" placeholder="Digite o valor" />

    <select id="type">
      <option value="c2f">Celsius → Fahrenheit</option>
      <option value="f2c">Fahrenheit → Celsius</option>
    </select>

    <button onclick="convert()">Converter</button>

    <div class="result" id="result"></div>

    <footer>
      Projeto de estudo DevOps 🚀
    </footer>
  </div>

  <script>
    function convert() {
      const value = parseFloat(document.getElementById("value").value);
      const type = document.getElementById("type").value;
      const resultDiv = document.getElementById("result");

      if (isNaN(value)) {
        resultDiv.innerText = "❌ Digite um número válido";
        return;
      }

      let result;

      if (type === "c2f") {
        result = (value * 9/5) + 32;
        resultDiv.innerText = `${value} °C = ${result.toFixed(2)} °F`;
      } else {
        result = (value - 32) * 5/9;
        resultDiv.innerText = `${value} °F = ${result.toFixed(2)} °C`;
      }
    }
  </script>

</body>
</html>
